<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Auto Slider Demo</title>
    <link rel="stylesheet" href="style.css"/>
</head>
<body>
    <div class="slider">
        <div class="slides">
            <img src="https://picsum.photos/id/1015/800/450" class="slide active"/>
            <img src="https://picsum.photos/id/1016/800/450" class="slide"/>
            <img src="https://picsum.photos/id/1018/800/450" class="slide"/>
            <img src="https://picsum.photos/id/104/800/450" class="slide"/>
        </div>
    <div class="controls">
        <!--Button Row-->
    <button onclick="prevSlide()">⏭️Prev⏭️</button>
    <button onclick="nextSlide()">⏭️Next⏭️</button>
</div>
</div>
<script src="script.js"></script>
</body>
</html>
