<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BootStrap Basics</title>
    <!--this is the BootStrap CSS Link-->
    <!--Without this BootStrap Styles won't work!
    -->
    <link 
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" 
    rel="stylesheet"
    />
</head>
<body>
    <div class="container mt-5">
        <!--center content + top margin-->
        <div class="p-4 bg-dark text-white text-center rounded">
        <!--Padding + dark background + center text-->
        <h1>BootStrap is very easy & awesome!</h1>
        <p>Just change the classes</p>
    </div>
    <div class="row mt-4 text-center">
        <div class="col-md-6">
            <!--grid + Row spacing & Half width column-->
            <div class="p-3 border">
                <h4 class="text-primary">Spacing</h4>
                <p class="mt-3">mt-3 -> top margin</p>
                <p class="p-2 border">p-2 -> padding</p>
            </div>
        </div>
        <div class="col-md-6">
            <div class="p-3 bg-success-subtle border rounded">
                <h4>Colors</h4>
                <p class="bg-primary p-2">Primary</p>
                <p class="bg-danger p-2">Danger</p>
            </div>
        </div>
    </div>
    <!--BootStrap button-->
    <div class="mt-4 text-center">
        <h4 class="text-danger">Buttons</h4>
        <button class="btn btn-primary">Primary</button>
         <button class="btn btn-success">Success</button>
          <button class="btn btn-danger">Danger</button>
          <button class="btn btn-warning">Warning</button>
          <br/><br/>
          <button class="btn btn-outline-dark">btn-outline-dark</button>
          <br/><br/>
          <button class="btn btn-dark w-100">Full Width</button>
    </div>
   </div> 
</body>
</html>
