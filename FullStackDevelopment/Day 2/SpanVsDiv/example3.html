<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>using both span & div</title>
    <style>
        .card{
            border:1px solid #ccc;
            border-radius: 8px;
            padding:16px;
        }
        .badge{
            background: #e1f5e1;
            color: #085008;
            padding:2px 8px;
            border-radius: 8px;
        }
        .price{
            font-weight: 800;
            color:brown;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div class="card">
    <p>Status: <span class="badge">Active</span></p>
        <p>Price: <span class="price">Rs.499</span></p>

    </div>
</body>
</html>
