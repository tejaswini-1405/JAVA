<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Span Vs Div</title>
    <style>
        body{
            background-color: aquamarine;
        }
    </style>
</head>
<body>
    <div style="background: #e6f1fb; padding: 12px; margin-bottom: 5px;">
        I am a div.I will take up the full width
    </div>
    <div style="background: #8ca849; padding: 12px; margin-top: 5px;">
        I am a div.I start on a new line.
    </div>
</body>
</html>
