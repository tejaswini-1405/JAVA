<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Async | Await Demo | Uisng JAvaScript</title>
    <style>
        body{
            font-family: Arial;
            text-align: center;
            margin-top: 50px;
            background-color: aqua;
        }
        h2{
            color: rgb(9, 9, 9);
        }
        button{
            padding: 10px 15px;
            margin: 5px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            background-color: navy;
            color: white;
        }
        button:hover{
            opacity: 0.7;
        }
        p{
            font-size: 18px;
            padding: 8px;
        }
        #a{
            color: rgb(215, 156, 45);
        }
        #b{
            color: rgb(158, 34, 34);
        }
        
    </style>
</head>
<body>
    <h2>Pizza demo🍕</h2>
    <button onclick="start()">Start Demo</button>
    <button onclick="alert('Playing soothing Music by Arjith singh🥰💖')">
        Play some music 🎵🎼🎶🎤
    </button>
    <p id="a">Person A:Idle</p>
    <p id="b">Person B:Idle</p>
    <script>
        function orderPizza(){
            return new Promise((resolve) => {
                setTimeout(() => {
                    resolve("Pizza ready🍕");
                }, 10000);

            });
        }
        async function PersonA() {
            let a=document.getElementById("a");
            a.innerText="Person A: Waiting for pizza ⌛";
            a.style.color="#ff9800";//orange
            let result=await orderPizza();
            a.innerText="Person A: " + result;
            a.style.color="#4CAF50";//Green
            
        }
        function personB(){
            let b=document.getElementById("b");
            b.innerText="Person B: Watching TV 📺";
            b.style.color="#2196F3";
        }
        function start(){
            PersonA();
            personB();
        }
    </script>
</body>
</html>
