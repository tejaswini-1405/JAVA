<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Javascript Concepts Student Dashboard</title>
    <style>
        body{
            font-family: Arial;
            background:skyblue;
            display:flex;
            justify-content: center;
            padding-top:30px;
            transition:0.3s;
        }
        .container{
            background-color:pink;
            padding: 20px;
            width:350px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
            text-align: center;
        }
        .dark{
            background: #121212;
            color:white;
        }
        .dark.container{
            background: #1e1e1e;
        }
        h1{
            margin-bottom: 10px;
        }
        button{
            padding: 6px 12px;
            margin: 5px;
            border: none;
            border-radius: 5px;
            background: #007bff;
            color: white;
            cursor: pointer;
        }
        button:hover{
            background:#0056b3;
        }
        input,
        textarea{
            width: 90%;
            padding: 5px;
            margin-top: 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        ul{
            text-align: left;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Dashboard</h1>
        <!--buttons-->
        <button onclick="toggleMode()">🌗 Mode</button>
        <button onclick="changeColor()">🎨 Color</button>
        <!--Clock-->
        <h2 id="clock"></h2>
        <hr/>
        <!--To Do list-->
        <h3>📝 To-Do-List</h3>
        <input id="task"/>
        <button onclick="addTask()">Add</button>
        <ul id="list"></ul>
        <hr/>
        <!--Password-->
        <h3>🔐show/hide password</h3>
        <input type="password" id="pass"/>
        <button onclick="togglePassword()">show/Hide</button>
        <hr/>
        <!--Counter for counting number of characters-->
        <h3>✍️Character counter</h3>
        <textarea id="text" oninput="countChars()"></textarea>
        <p>Count <span id="count">0</span></p>
    </div>
    <script>
        //🌗Dark mode
        function toggleMode(){
            document.body.classList.toggle("dark");
        }
        //🎨Random colour
        function changeColor(){
            let colors=["Red","orange","blue","green","yellow","grey","skyblue"];
            let i=Math.floor(Math.random()*colors.length);
            document.body.style.background=colors[i];
        }
        //⏰clock
        function showTime(){
            let now=new Date();
            document.getElementById("clock").innerText=now.toLocaleString();
        }
        setInterval(showTime,1000);
        //📝To-do list
        function addTask(){
            let task=document.getElementById("task").value;
            let li=document.createElement("li");
            li.innerText=task;//wash clothes
            document.getElementById("list").appendChild(li);
        }
        //🔐 Password Toggle show/hide
        function togglePassword(){
            let p=document.getElementById("pass");
            p.type=p.type==="password" ? "text" : "password";
        }
        // ✍️ Character counter
        //By using the text.length property
        function countChars(){
            let text=document.getElementById("text").value;
            document.getElementById("count").innerText=text.length;
        }
    </script>
 
</body>
</html>
