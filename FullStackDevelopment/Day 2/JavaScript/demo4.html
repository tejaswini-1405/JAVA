<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toggle Dark/light modes</title>
    <style>
        .dark-mode{
            background-color: #333;
            color:white;
        }
    </style>
</head>
<body>
    <button onclick="toggleTheme()">Toggle Dark/light Mode 🌑☀️</button>
    <script>
        function toggleTheme(){
            document.body.classList.toggle("dark-mode");
        }
    </script>
</body>
</html>
