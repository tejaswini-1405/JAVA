<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Flex box</title>
    <style>
        .container{
            display:flex;
            justify-content: space-evenly; /*Horizantal alignment*/
            align-items:center; /*Vertical alignment*/
            height: 200px;
            background-color: #f0f0f0;
        }
        .box{
            width: 80px;
            height: 80px;
            background-color: orange;
            color:white;
            display:flex;
            justify-content: center;
            align-items: center;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.8);
            
        }
    </style>
</head>
<body>
    <h2>Flex Box Demo</h2>
    <div class="container">
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
    </div>
</body>
</html>
