<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Box Model</title>
    <style>
        .box{
            width:200px;
            height:100px;
            background-color: lightblue; /*content*/
            color:brown;/*content*/
            padding:20px;/*Inside space*/
            border: 5px solid blue; /*Border*/
            margin: 50px; /*Outer space*/
        } 
    </style>
</head>
<body>
    <h2>Box Model</h2>
    <div class="box">Saurav</div>
</body>
</html>
